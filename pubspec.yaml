name: synapse
description: SYNAPSE - Spatial Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & AR
  camera: ^0.10.5
  permission_handler: ^11.2.0
  
  # Backend - Firebase
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  
  # AI / ML
  tflite_flutter: ^0.10.3
  
  # Animation Suite
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  rive: ^0.13.1
  
  # UI Polish
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  
  # Hardware
  sensors_plus: ^4.0.2
  haptic_feedback: ^0.4.2
  
  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # Voice
  speech_to_text: ^6.6.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  pocketbase: ^0.18.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/models/

     